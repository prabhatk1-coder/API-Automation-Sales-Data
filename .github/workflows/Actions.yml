name: Run Script Every 30 Mins

on:
  schedule:
    # This is "Cron" syntax. '*/30' means every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Or install manually: pip install requests pandas gspread gspread-dataframe google-auth

      - name: Run Python script
        run: python your_script.py
